<!DOCTYPE html>
<html>
<head>
  <title>Auth - Welcome</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      display: flex;
      gap: 30px;
      max-width: 1200px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* CHATBOT SECTION */
    .chatbot-section {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      flex: 1;
      min-width: 320px;
      max-width: 450px;
      animation: slideInLeft 0.6s ease-out;
    }

    .chatbot-header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }

    .chatbot-header h3 {
      color: #2874f0;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .chatbot-header p {
      color: #878787;
      font-size: 14px;
    }

    #chatbox {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 15px;
      height: 350px;
      overflow-y: auto;
      margin-bottom: 15px;
      border: 1px solid #e0e0e0;
      scrollbar-width: thin;
      scrollbar-color: #2874f0 #f0f0f0;
    }

    #chatbox::-webkit-scrollbar {
      width: 6px;
    }

    #chatbox::-webkit-scrollbar-track {
      background: #f0f0f0;
      border-radius: 10px;
    }

    #chatbox::-webkit-scrollbar-thumb {
      background: #2874f0;
      border-radius: 10px;
    }

    #chatbox p {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.5;
      animation: fadeIn 0.3s ease-in;
    }

    #chatbox p b {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    #chatbox p:has(b:contains("You")) {
      background: #e3f2fd;
      margin-left: 20px;
      border-left: 3px solid #2874f0;
    }

    #chatbox p:has(b:contains("Bot")) {
      background: white;
      margin-right: 20px;
      border-left: 3px solid #ff9800;
    }

    .chat-input-group {
      display: flex;
      gap: 10px;
    }

    #chat_input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-size: 14px;
      transition: all 0.3s ease;
      outline: none;
    }

    #chat_input:focus {
      border-color: #2874f0;
      box-shadow: 0 0 0 3px rgba(40, 116, 240, 0.1);
    }

    .chat-send-btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #2874f0 0%, #1557bf 100%);
      color: white;
      border: none;
      border-radius: 25px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(40, 116, 240, 0.3);
    }

    .chat-send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(40, 116, 240, 0.4);
    }

    .chat-send-btn:active {
      transform: translateY(0);
    }

    /* AUTH SECTION */
    .box {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      flex: 1;
      min-width: 320px;
      max-width: 450px;
      animation: slideInRight 0.6s ease-out;
    }

    .tab-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .tab-buttons button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #f0f0f0;
      color: #878787;
    }

    .tab-buttons button:hover {
      background: #e0e0e0;
    }

    .signup-btn {
      background: linear-gradient(135deg, #2874f0 0%, #1557bf 100%) !important;
      color: white !important;
    }

    .login-btn {
      background: linear-gradient(135deg, #fb641b 0%, #d43900 100%) !important;
      color: white !important;
    }

    .tab-buttons .signup-btn:hover,
    .tab-buttons .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }

    h2 {
      color: #212121;
      font-size: 28px;
      margin-bottom: 25px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      margin: 10px 0;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
      background: #fafafa;
      outline: none;
    }

    input:focus {
      border-color: #2874f0;
      background: white;
      box-shadow: 0 0 0 3px rgba(40, 116, 240, 0.1);
    }

    input::placeholder {
      color: #878787;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      color: white;
    }

    .box .signup-btn {
      background: linear-gradient(135deg, #2874f0 0%, #1557bf 100%);
      box-shadow: 0 4px 15px rgba(40, 116, 240, 0.3);
    }

    .box .login-btn {
      background: linear-gradient(135deg, #fb641b 0%, #d43900 100%);
      box-shadow: 0 4px 15px rgba(251, 100, 27, 0.3);
    }

    .box button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .box button:active {
      transform: translateY(0);
    }

    #msg {
      margin-top: 15px;
      font-size: 14px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: 500;
      animation: fadeIn 0.3s ease-in;
    }

    .hidden {
      display: none;
    }

    /* FORM GRID */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-row input {
      margin: 10px 0;
    }

    /* ANIMATIONS */
    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        align-items: center;
      }

      .chatbot-section,
      .box {
        max-width: 100%;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      h2 {
        font-size: 24px;
      }
    }

    /* LOGO/BRAND */
    .brand {
      text-align: center;
      margin-bottom: 20px;
    }

    .brand-logo {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #2874f0 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand-tagline {
      font-size: 12px;
      color: #878787;
      margin-top: 5px;
    }

    /* SUCCESS/ERROR STATES */
    #msg.success {
      background: #e8f5e9;
      color: #2e7d32;
      border-left: 4px solid #4caf50;
    }

    #msg.error {
      background: #ffebee;
      color: #c62828;
      border-left: 4px solid #f44336;
    }
  </style>
</head>

<body>
<div class="container">
  
  <!-- CHATBOT SECTION -->
  <div class="chatbot-section">
    <div class="chatbot-header">
      <h3>💬 AI Assistant</h3>
      <p>Ask me anything!</p>
    </div>
    
    <div id="chatbox"></div>
    
    <div class="chat-input-group">
      <input id="chat_input" placeholder="Type your message here..." />
      <button class="chat-send-btn" onclick="sendChat()">Send</button>
    </div>
  </div>

  <!-- AUTH SECTION -->
  <div class="box">
    <div class="brand">
      <div class="brand-logo">ShopHub</div>
      <div class="brand-tagline">Your trusted shopping companion</div>
    </div>

    <!-- TAB BUTTONS -->
    <div class="tab-buttons">
      <button class="signup-btn" onclick="showSignup()">Sign Up</button>
      <button class="login-btn" onclick="showLogin()">Login</button>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupBox">
      <h2>Create Account</h2>
      <input id="s_name" placeholder="Full Name" />
      <input id="s_email" placeholder="Email Address" type="email" />
      <div class="form-row">
        <input id="s_phone" placeholder="Phone Number" />
        <input id="s_password" type="password" placeholder="Password" />
      </div>
      <div class="form-row">
        <input id="s_city" placeholder="City" />
        <input id="s_state" placeholder="State" />
      </div>
      <input id="s_country" placeholder="Country" />
      <input id="s_address" placeholder="Full Address" />
      <button class="signup-btn" onclick="signup()">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginBox" class="hidden">
      <h2>Welcome Back!</h2>
      <input id="l_email" placeholder="Email Address" type="email" />
      <input id="l_password" type="password" placeholder="Password" />
      <button class="login-btn" onclick="login()">Login to Continue</button>
    </div>

    <p id="msg"></p>
  </div>

</div>

<script>
const signupBox = document.getElementById("signupBox");
const loginBox  = document.getElementById("loginBox");
const msg       = document.getElementById("msg");

function showLogin(){
  signupBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
  msg.innerText = "";
  msg.className = "";
}

function showSignup(){
  loginBox.classList.add("hidden");
  signupBox.classList.remove("hidden");
  msg.innerText = "";
  msg.className = "";
}

/* SIGNUP */
async function signup(){
  let res = await fetch("/signup",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      name: document.getElementById("s_name").value,
      email: document.getElementById("s_email").value,
      phone: document.getElementById("s_phone").value,
      password: document.getElementById("s_password").value,
      city: document.getElementById("s_city").value,
      state: document.getElementById("s_state").value,
      country: document.getElementById("s_country").value,
      address: document.getElementById("s_address").value
    })
  });

  let data = await res.json();
  msg.innerText = data.message;
  msg.className = res.status === 200 ? "success" : "error";

  // switch to login after success
  if(res.status === 200){
    setTimeout(showLogin, 700);
  }
}

/* LOGIN */
async function login(){
  let res = await fetch("/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: document.getElementById("l_email").value,
      password: document.getElementById("l_password").value
    })
  });

  let data = await res.json();
  msg.innerText = data.message;
  msg.className = res.status === 200 ? "success" : "error";

  if(res.status === 200 && data.redirect){
    setTimeout(() => {
      window.location.href = data.redirect;
    }, 500);
  }
}

/* CHATBOT */
async function sendChat(){
  const chatbox = document.getElementById("chatbox");
  const input = document.getElementById("chat_input");
  const message = input.value.trim();
  if(!message) return;

  chatbox.innerHTML += `<p><b>You:</b> ${message}</p>`;
  chatbox.scrollTop = chatbox.scrollHeight;

  let res = await fetch("/chatbot", {
    method: "POST",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify({message})
  });

  let data = await res.json();
  chatbox.innerHTML += `<p><b>Bot:</b> ${data.response}</p>`;
  chatbox.scrollTop = chatbox.scrollHeight;
  input.value = "";
}
</script>
</body>
</html>
