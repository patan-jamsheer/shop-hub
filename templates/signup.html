<!DOCTYPE html>
<html>
<head>
  <title>Create Account</title>
  <style>
    body{
      font-family: Arial;
      background:#f2f2f2;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .box{
      background:white;
      padding:20px;
      width:350px;
      border-radius:6px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    input, button {
      width:100%;
      padding:10px;
      margin:8px 0;
    }
    button{
      background:#007bff;
      color:white;
      border:none;
      cursor:pointer;
    }
    h2{
      text-align:center;
      margin-bottom:20px;
    }
  </style>
</head>

<body>
<div class="box">
  <h2>Create Account</h2>
  <input id="name" placeholder="Name" required>
  <input id="email" placeholder="Email" required>
  <input id="phone" placeholder="Phone" required>
  <input id="password" type="password" placeholder="Password" required>
  <input id="city" placeholder="City">
  <input id="state" placeholder="State">
  <input id="country" placeholder="Country">
  <textarea id="address" placeholder="Address" style="width:100%; padding:10px; margin:8px 0;"></textarea>
  <button onclick="signup()">Sign Up</button>
  <p id="msg"></p>
</div>

<script>
async function signup(){
  let data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    password: document.getElementById("password").value,
    city: document.getElementById("city").value,
    state: document.getElementById("state").value,
    country: document.getElementById("country").value,
    address: document.getElementById("address").value
  };

  if(!data.name || !data.email || !data.phone || !data.password){
    document.getElementById("msg").innerText = "Name, Email, Phone, and Password are required!";
    document.getElementById("msg").style.color = "red";
    return;
  }

  try {
    let res = await fetch("/signup",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(data)
    });

    let result = await res.json();
    document.getElementById("msg").innerText = result.message;
    document.getElementById("msg").style.color = res.status === 200 ? "green" : "red";
  } catch(err){
    document.getElementById("msg").innerText = "Signup failed. Try again!";
    document.getElementById("msg").style.color = "red";
    console.error(err);
  }
}
</script>

</body>
</html>
